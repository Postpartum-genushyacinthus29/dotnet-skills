name: Publish Catalog Release

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:
    inputs:
      catalog_version:
        description: "Catalog version to publish, for example 1.0.0, 1.2.3-preview.1, or 2026.3.15.42"
        required: false
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

env:
  CATALOG_TAG_PREFIX: "catalog-v"
  DOTNET_SKILLS_SITE_URL: https://managedcode.github.io/dotnet-skills/

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check for new commits on main since latest catalog release
        id: changes
        shell: bash
        run: |
          git fetch --force --tags origin main

          latest_tag=$(git tag --list "${{ env.CATALOG_TAG_PREFIX }}*" --sort=-v:refname | head -n 1)
          main_ref="origin/main"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ inputs.catalog_version }}" ]]; then
            echo "has_new_commits=true" >> "$GITHUB_OUTPUT"
            echo "latest_tag=$latest_tag" >> "$GITHUB_OUTPUT"
            echo "override=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ -z "$latest_tag" ]]; then
            echo "has_new_commits=true" >> "$GITHUB_OUTPUT"
            echo "latest_tag=" >> "$GITHUB_OUTPUT"
            echo "override=false" >> "$GITHUB_OUTPUT"
            echo "reason=initial_catalog_release" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed_files="$(git diff --name-only "$latest_tag" "$main_ref")"

          has_new_commits=false
          while IFS= read -r file; do
            case "$file" in
              skills/*|agents/*|scripts/generate_catalog.py|scripts/generate_agent_catalog.py|scripts/generate_pages.py|github-pages/index.html|README.md|.github/upstream-watch*.json|.github/workflows/publish-catalog.yml|.github/workflows/publish-pages.yml)
                has_new_commits=true
                break
                ;;
            esac
          done <<< "$changed_files"

          echo "has_new_commits=$has_new_commits" >> "$GITHUB_OUTPUT"
          echo "latest_tag=$latest_tag" >> "$GITHUB_OUTPUT"
          echo "override=false" >> "$GITHUB_OUTPUT"
          echo "reason=$([ "$has_new_commits" = "true" ] && echo relevant_changes || echo no_relevant_changes)" >> "$GITHUB_OUTPUT"
          echo "Changed files since last catalog tag:"
          echo "$changed_files"

          echo "latest_tag=$latest_tag" >> "$GITHUB_OUTPUT"
          echo "override=false" >> "$GITHUB_OUTPUT"

      - name: Skip release when main has no new commits
        if: steps.changes.outputs.has_new_commits != 'true'
        shell: bash
        run: |
          echo "No new commits on main since latest catalog tag '${{ steps.changes.outputs.latest_tag }}'. Skipping release."

      - name: Set up Python
        if: steps.changes.outputs.has_new_commits == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Validate catalog version
        if: steps.changes.outputs.has_new_commits == 'true'
        id: version
        shell: bash
        run: |
          version='${{ inputs.catalog_version }}'

          if [[ -z "$version" ]]; then
            year="$(date -u +%Y)"
            month=$((10#$(date -u +%m)))
            day=$((10#$(date -u +%d)))
            version="${year}.${month}.${day}.${GITHUB_RUN_NUMBER}"
          fi

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "Catalog version must be SemVer-compatible. Got: $version" >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=${{ env.CATALOG_TAG_PREFIX }}$version" >> "$GITHUB_OUTPUT"

      - name: Generate catalog outputs in CI
        if: steps.changes.outputs.has_new_commits == 'true'
        run: python3 scripts/generate_catalog.py

      - name: Package catalog release assets
        if: steps.changes.outputs.has_new_commits == 'true'
        shell: bash
        run: |
          rm -rf artifacts/catalog-release artifacts/catalog-payload
          mkdir -p artifacts/catalog-release artifacts/catalog-payload/catalog
          cp -R skills artifacts/catalog-payload/skills
          cp catalog/skills.json artifacts/catalog-payload/catalog/skills.json
          cp catalog/skills.json artifacts/catalog-release/dotnet-skills-manifest.json
          (
            cd artifacts/catalog-payload
            zip -r ../catalog-release/dotnet-skills-catalog.zip skills catalog
          )

      - name: Upload packaged catalog artifacts
        if: steps.changes.outputs.has_new_commits == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: dotnet-skills-catalog-${{ steps.version.outputs.version }}
          path: artifacts/catalog-release/*
          if-no-files-found: error

      - name: Create or update catalog release
        if: steps.changes.outputs.has_new_commits == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag='${{ steps.version.outputs.tag }}'
          title="Catalog ${{ steps.version.outputs.version }}"
          notes=$(cat <<EOF
          Automated catalog release for dotnet-skills content.

          Source commit: ${{ github.sha }}
          Assets:
          - dotnet-skills-manifest.json
          - dotnet-skills-catalog.zip
          EOF
          )

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" --title "$title" --notes "$notes"
          else
            gh release create "$tag" --title "$title" --notes "$notes" --latest
          fi

          gh release upload "$tag" artifacts/catalog-release/dotnet-skills-manifest.json artifacts/catalog-release/dotnet-skills-catalog.zip --clobber

      - name: Generate GitHub Pages payload
        if: steps.changes.outputs.has_new_commits == 'true'
        run: python3 scripts/generate_agent_catalog.py

      - name: Render GitHub Pages
        if: steps.changes.outputs.has_new_commits == 'true'
        run: python3 scripts/generate_pages.py

      - name: Setup Pages
        if: steps.changes.outputs.has_new_commits == 'true'
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        if: steps.changes.outputs.has_new_commits == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: "artifacts/github-pages"

      - name: Deploy GitHub Pages
        id: pages_deploy
        if: steps.changes.outputs.has_new_commits == 'true'
        uses: actions/deploy-pages@v4
